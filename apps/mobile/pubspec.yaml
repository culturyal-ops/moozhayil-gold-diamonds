name: moozhayil
description: Moozhayil Gold & Diamonds mobile app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.1
  freezed_annotation: ^3.1.0
  go_router: ^16.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  razorpay_flutter: ^1.3.7
  reactive_forms: ^18.2.0
  riverpod_annotation: ^3.0.3
  google_fonts: ^8.1.0
  connectivity_plus: ^7.2.0
  image_picker: ^1.2.0
  lucide_icons_flutter: ^3.0.0
  url_launcher: ^6.3.2
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10

dev_dependencies:
  build_runner: ^2.7.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  riverpod_generator: ^3.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/moozhayil_logo.png
    - assets/images/moozhayil_monogram_flat.svg
    # Brand photography — drop files here as they become available:
    # assets/images/products/
    # assets/images/brands/
    # assets/images/hero/
    # assets/images/showroom/
  fonts:
    - family: Cormorant Garamond
      fonts:
        - asset: assets/fonts/CormorantGaramond.ttf
